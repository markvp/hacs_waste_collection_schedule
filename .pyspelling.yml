spellchecker: hunspell
jobs: 4

matrix:
  - name: markdown-docs
    sources:
      - "doc/*.md"
      - "README.md"
      - "info.md"
    hunspell:
      d: en_US
    pipeline:
      - pyspelling.filters.markdown:
          markdown_extensions:
            - markdown.extensions.extra
      - pyspelling.filters.html:
          comments: false
          ignores:
            - code
            - pre
    dictionary:
      wordlists:
        - .pyspelling-wordlist
      output: build/spelling-docs.dic

  - name: translations-en
    sources:
      - "build/translations/en.txt"
    hunspell:
      d: en_US
    pipeline:
      - pyspelling.filters.text
    dictionary:
      wordlists:
        - .pyspelling-wordlist
      output: build/spelling-en.dic

