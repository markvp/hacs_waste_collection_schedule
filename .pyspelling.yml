spellchecker: hunspell
jobs: 4

matrix:
  # Markdown docs are too code-heavy (source names, identifiers,
  # code examples) for meaningful spell checking. Generated docs
  # (README, info.md, doc/source/) also contain thousands of place
  # names from ~600 worldwide providers.

  - name: translations-en
    sources:
      - "build/translations/en.txt"
    hunspell:
      d: en_US
    pipeline:
      - pyspelling.filters.text
    dictionary:
      wordlists:
        - .pyspelling-wordlist
      output: build/spelling-en.dic

